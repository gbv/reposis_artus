name: Check PR

on:
  [ pull_request ]

permissions:
  contents: read

jobs:
  build:
    concurrency:
      group: pr-checks-${{ github.repository }}-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: gbv/reposis_workflows/.github/workflows/maven-build.yml@v1
    with:
      java-version: '21'
